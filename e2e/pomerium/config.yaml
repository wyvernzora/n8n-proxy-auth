# Minimal Pomerium config for the OPTIONAL real-Pomerium e2e smoke (P4). NON-GATING.
#
# Secrets and TLS material are referenced BY PATH (mounted from e2e/pomerium/.generated/, which
# is generated by e2e/gen-pomerium.ts and gitignored). NO private key is inlined here.
#
# Topology: Dex (static OIDC IdP) -> Pomerium (HTTPS, signs an ES256 assertion) -> hooked n8n.
# Pomerium injects x-pomerium-jwt-assertion to the n8n upstream and strips any client-supplied
# copy on ingress. The hook verifies that assertion against Pomerium's own signing JWKS.

# HTTPS listener (TLS leaf cert/key are generated; SAN = the route host).
address: ':443'
certificate_file: /pomerium/.generated/tls-cert.pem
certificate_key_file: /pomerium/.generated/tls-key.pem

# cookie_secret / shared_secret come from the generated secrets.env (compose env), NOT inlined.
# signing_key: Pomerium derives the per-request assertion JWKS from this ES256 key. The hook
# trusts the matching public JWKS at https://<route-host>/.well-known/pomerium/jwks.json.
signing_key_file: /pomerium/.generated/signing-key.pem

# Keep the authenticate flow ON-CLUSTER. Without this, Pomerium defaults to its HOSTED authenticate
# service (authenticate.pomerium.app), so the sign-in redirect leaves this stack entirely and no
# LOCAL OIDC login (curl or browser) can ever complete — making the live-token capture impossible.
# A dedicated authenticate host (its own route below) keeps the whole dance inside the compose net.
authenticate_service_url: https://authenticate.pomerium.localhost:8443

# Identity provider: a static OIDC IdP (Dex) with one fixed test user.
idp_provider: oidc
idp_provider_url: https://dex.pomerium.localhost:5556/dex
idp_client_id: pomerium
idp_client_secret: pomerium-e2e-secret
idp_scopes:
  - openid
  - email
  - profile

# Trust the self-signed CA that signed Dex's TLS (the same generated CA).
autocert: false

# Enable the per-session raw-assertion endpoint (/.pomerium/jwt). It is gated behind a runtime flag
# (RuntimeFlagPomeriumJWTEndpoint, defaults to FALSE at v0.30.4); the runner reads a LIVE assertion
# from it to record the real iss/aud/alg. Without this the endpoint 404s and the capture cannot run.
runtime_flags:
  pomerium_jwt_endpoint: true

routes:
  - from: https://n8n.pomerium.localhost
    to: http://n8n:5678
    # Authenticate the request, then forward the signed assertion to the upstream. Pomerium injects
    # x-pomerium-jwt-assertion (and overwrites any client-supplied copy with its own freshly-signed
    # value) whenever a signing_key is configured and identity headers are passed — so we do NOT add
    # an explicit remove_request_headers strip for that header: at v0.30.4 the route-level strip is
    # applied to the request Pomerium forwards and would clobber Pomerium's OWN injected assertion,
    # leaving the upstream with no header. Pomerium already replaces the client copy on ingress.
    pass_identity_headers: true
    policy:
      - allow:
          and:
            - email:
                is: p4-user@pomerium.e2e.test
