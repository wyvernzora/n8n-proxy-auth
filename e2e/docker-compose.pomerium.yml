# OPTIONAL real-Pomerium e2e topology (P4). NON-GATING — NOT the required check.
#
# Distinct project name (-p n8n-proxy-auth-p4) and distinct host ports from the gating stack
# (e2e/docker-compose.yml, which publishes 5699) so the two stacks cannot collide.
#
#   dex      : static OIDC IdP (one fixed test user)
#   pomerium : real Pomerium, HTTPS listener, signs the ES256 assertion, injects the header
#   hook     : one-shot artifact installer image, copies hook.cjs into the shared volume
#   n8n      : official n8n image, loading the mounted hook
#
# Secrets/TLS are mounted from e2e/pomerium/.generated/ (generated by gen-pomerium.ts, gitignored).
# Only Pomerium publishes a host port for the positive path; n8n is host-published on a SEPARATE
# diagnostic port ONLY for the negative direct-bypass assertion.

services:
  hook:
    image: ${HOOK_IMAGE:-n8n-proxy-auth-hook:test}
    volumes:
      - proxy-auth-hook:/out

  dex:
    image: dexidp/dex:v2.39.1
    command: ['dex', 'serve', '/etc/dex/dex.yaml']
    volumes:
      # The Dex config is RENDERED by gen-pomerium.ts (committed template + a fresh bcrypt hash) so
      # the static password and its hash are guaranteed to match.
      - ./pomerium/.generated/dex.yaml:/etc/dex/dex.yaml:ro
      - ./pomerium/.generated/tls-cert.pem:/tls/tls-cert.pem:ro
      - ./pomerium/.generated/tls-key.pem:/tls/tls-key.pem:ro
    ports:
      # Publish Dex on the host so a client-driven OIDC login (browser/Playwright, or the manual
      # capture in docs/maintenance.md) can reach the login form directly. Pomerium reaches Dex over the
      # compose network either way; the host publish is ONLY for the client hop of the auth-code
      # flow (the IdP login page the user fills in). The mandatory/deterministic tier never needs it.
      - '5556:5556'
    networks:
      default:
        aliases:
          - dex.pomerium.localhost

  pomerium:
    image: pomerium/pomerium:v0.30.4
    depends_on:
      - dex
      - n8n
    # secrets.env carries Pomerium's canonical COOKIE_SECRET / SHARED_SECRET names directly, so the
    # env_file feeds Pomerium without any `${...}` compose-interpolation indirection (compose-file
    # interpolation reads the host shell / a top-level .env, NEVER a service env_file).
    env_file:
      - ./pomerium/.generated/secrets.env
    environment:
      # Trust the generated CA so Pomerium can reach Dex over HTTPS.
      SSL_CERT_FILE: /pomerium/.generated/tls-ca.pem
    volumes:
      - ./pomerium/config.yaml:/pomerium/config.yaml:ro
      - ./pomerium/.generated:/pomerium/.generated:ro
    command: ['--config', '/pomerium/config.yaml']
    ports:
      # The only host-published port for the positive (THROUGH-Pomerium) path.
      - '8443:443'
    networks:
      default:
        aliases:
          # The route host resolves to Pomerium from inside the compose network, so n8n can
          # fetch the signing JWKS at https://n8n.pomerium.localhost/.well-known/pomerium/jwks.json.
          # NOTE: dex.pomerium.localhost is intentionally NOT aliased here — that name must resolve
          # only to the dex service. Aliasing it on both services makes embedded DNS round-robin and
          # half the OIDC-discovery lookups would hit Pomerium (which does not serve Dex's port).
          - n8n.pomerium.localhost
          # The on-cluster authenticate host also resolves to Pomerium (its sign-in/callback
          # listener). Set via authenticate_service_url in config.yaml so the OIDC dance stays
          # inside the compose network instead of bouncing to Pomerium's hosted SaaS authenticate.
          - authenticate.pomerium.localhost

  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:2.26.8}
    depends_on:
      hook:
        condition: service_completed_successfully
    environment:
      DB_TYPE: sqlite
      EXTERNAL_HOOK_FILES: /opt/proxy-auth/hook.cjs
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_USER_FOLDER: /tmp/n8n
      # JWKS / iss / aud point at the ROUTE HOST (the working hypothesis; the runner captures the
      # LIVE values and asserts they match what the verifier accepts).
      # iss/aud are the BARE host (no scheme): Pomerium's default jwt_issuer_format is
      # IssuerHostOnly, which emits iss == aud == the route hostname with no scheme/trailing slash
      # (authorize/evaluator getJWTPayloadIss / getJWTPayloadAud). The verifier exact-matches iss,
      # so a schemed value (https://...) would reject every genuine assertion. The runner's captured
      # LIVE iss/aud are authoritative; reconcile the preset/compose to whatever they actually show.
      N8N_PROXY_AUTH_JWKS_URL: https://n8n.pomerium.localhost/.well-known/pomerium/jwks.json
      N8N_PROXY_AUTH_ISSUER: n8n.pomerium.localhost
      N8N_PROXY_AUTH_AUDIENCE: n8n.pomerium.localhost
      N8N_PROXY_AUTH_ALGORITHMS: ES256
      # Trust the generated CA so the in-container HTTPS JWKS fetch succeeds — NOT
      # NODE_TLS_REJECT_UNAUTHORIZED=0 (which would disable verification wholesale).
      NODE_EXTRA_CA_CERTS: /certs/tls-ca.pem
      # The Pomerium->n8n hop is plain HTTP inside the network; n8n issues a non-secure cookie.
      N8N_SECURE_COOKIE: 'false'
    volumes:
      - ./pomerium/.generated/tls-ca.pem:/certs/tls-ca.pem:ro
      - proxy-auth-hook:/opt/proxy-auth:ro
    # The route host (n8n.pomerium.localhost) resolves to the Pomerium container via the network
    # alias declared on the pomerium service above, so n8n's in-container JWKS fetch over HTTPS
    # reaches Pomerium. No extra_hosts override is needed (and 127.0.0.1 would be wrong here —
    # it must resolve to the Pomerium container, not n8n's own loopback).
    ports:
      # Diagnostic-only: used ONLY for the negative direct-bypass assertion.
      - '5710:5678'

networks:
  default:
    name: n8n-proxy-auth-p4-net

volumes:
  proxy-auth-hook:
