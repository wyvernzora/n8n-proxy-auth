# build-test-publish: every PR runs the e2e gate; push to main (or manual dispatch) publishes the
# patched image to GHCR.
#
# CONTRACT: the gate job id AND its rendered name are both `e2e`. That literal string is the
# required-status-check that branch protection enforces (see docs/operations.md). Renaming the job
# is a BREAKING change — update the branch-protection rule and docs/operations.md in lockstep, or
# Renovate auto-merge silently loses its only safety interlock.
name: build-test-publish

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # packages/attestations/id-token are used only by the publish steps (push/dispatch). On PR runs
  # they go unused — an accepted trade-off for keeping this a single job; PRs never publish.
  packages: write
  attestations: write
  id-token: write

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile

      # Local gate: typecheck + lint + format + unit tests + tsup build (emits dist/hook.cjs).
      - run: corepack pnpm run check
      - name: Ensure hook artifact built
        run: test -f dist/hook.cjs || { echo "::error::dist/hook.cjs missing after build"; exit 1; }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Single source of truth: the image version is the Dockerfile ARG (shared with Renovate).
      # Anchor at line start so the comment line that mentions "ARG N8N_VERSION=..." cannot match.
      - name: Derive image ref + version
        id: meta
        run: |
          version="$(sed -n 's/^ARG N8N_VERSION=//p' Dockerfile | head -n1)"
          [ -n "$version" ] || { echo "::error::could not read N8N_VERSION from Dockerfile"; exit 1; }
          repo="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          {
            echo "version=$version"
            echo "image=ghcr.io/$repo"
          } >> "$GITHUB_OUTPUT"

      # REQUIRED gate (runs on every event). scripts/e2e.sh builds the patched image and runs the
      # real docker-compose e2e (mock JWKS + n8n + Pomerium-playing driver) + the S12 boot-survival
      # check. Same invocation locally and in CI.
      - name: E2E gate (real image)
        run: ./scripts/e2e.sh n8n-proxy-auth:test

      # ---- Publish (push to main / manual dispatch only; never on PRs) ----
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch image
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          provenance: true
          sbom: true

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
