# build-test-publish: every PR and main push runs the real n8n e2e gate against the hook artifact
# image. Release tags publish the versioned artifact image and GitHub release tarball.
#
# CONTRACT: the gate job id AND its rendered name are both `e2e`. That literal string is the
# required-status-check that branch protection enforces (see docs/maintenance.md). Renaming the job
# is a BREAKING change — update the branch-protection rule and docs/maintenance.md in lockstep, or
# Renovate auto-merge silently loses its only safety interlock.
name: build-test-publish

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile

      # Local gate: typecheck + lint + format + unit tests + tsup build (emits dist/hook.cjs).
      - run: corepack pnpm run check
      - name: Ensure hook artifact built
        run: test -f dist/hook.cjs || { echo "::error::dist/hook.cjs missing after build"; exit 1; }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # REQUIRED gate (runs on every event). scripts/e2e.sh builds the hook artifact image, runs
      # official n8n with the hook mounted from a one-shot installer container, and executes the
      # mock-JWKS scenarios + S12 boot-survival check. Same invocation locally and in CI.
      - name: E2E gate (real image)
        run: ./scripts/e2e.sh n8n-proxy-auth-hook:test
